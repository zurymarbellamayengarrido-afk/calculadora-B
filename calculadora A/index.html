                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora de propinas</title>
    <link rel="stylesheet" href="../css/calculadora.css">
</head>
<body>
    
    <div class="calculadora">
        <h1> calculadora de propinas  </h1>

        <label for="cuenta">total de la cuenta (Q):</label>
        <input type="number" id="cuenta" placeholder="Ej: 100.00" min="0">

        <label for="porcentaje">porcentaje de propina</label>
        <select id="porcentaje">
            <option value="10">10%</option>
            <option value="15" selected>20%</option>
            <option value="20">20%</option>
            <option value="25">25%</option>
        </select>
        
        <label for="personas">numero de personas:</label>
        <input type="number" id="personas" placeholder="Ej: 4" min="1" value="1">

        <button onclick="calcular()">zury</button>

        <div class="resultado" id="resultado">
            <p>propina: <span id="propina"></span></p>
            <p>total: <span id="total"></span></p>
            <p>por persona: <span id="porPersona"></span></p>
        </div>
    </div>


<script src="calculadores.js"></script>



</body>
</html>
